          <!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生重開錶 — 迴圈控制系統</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --cold:#b0ccd8; --dim:#6aaabb; --void:#06080a; --gr:#ff3344; --gc:#00eeff; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  background:var(--void); color:var(--cold);
  font-family:'Courier New',monospace; display:flex; position:relative;
}
body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
  pointer-events:none; z-index:300;
}
.left-panel {
  width:48%; height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border-right:1px solid #0e2530; position:relative;
}
.right-panel {
  width:52%; height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:24px 32px; position:relative;
}
#watchCanvas { display:block; width:100%; max-width:420px; aspect-ratio:1; }
#loadingMsg { font-size:10px; letter-spacing:3px; color:#2a5060; text-transform:uppercase; margin-top:12px; transition:opacity .5s; }
.watch-title { font-size:11px; letter-spacing:5px; color:#3a6a7a; text-transform:uppercase; margin-top:12px; }

#counterSection { width:100%; text-align:center; transition:opacity .25s,transform .25s; }
#counterSection.hidden { opacity:0; transform:translateY(16px); pointer-events:none; }

.sys-header { font-size:9px; letter-spacing:5px; color:#4a8090; text-transform:uppercase; margin-bottom:6px; }
.frozen-date { font-size:22px; letter-spacing:6px; color:#6aaabb; margin-bottom:40px; }
.ctr-label { font-size:9px; letter-spacing:5px; color:#4a8090; text-transform:uppercase; margin-bottom:4px; }
#loopCounter {
  font-size:clamp(72px,12vw,148px); font-weight:900; line-height:1;
  letter-spacing:-3px; color:var(--cold); font-variant-numeric:tabular-nums;
  display:inline-block; animation:flicker 12s infinite;
}
@keyframes flicker { 0%,91%,100%{opacity:1} 92%{opacity:.7} 93%{opacity:1} 96%{opacity:.5} 97%{opacity:1} }
.glitching { animation:glitch-a .18s steps(1) forwards !important; }
@keyframes glitch-a {
  0%  {transform:none;color:var(--cold);text-shadow:none;clip-path:none}
  15% {transform:translate(-4px,0);color:var(--gr);text-shadow:4px 0 var(--gc);clip-path:inset(5% 0 88% 0)}
  30% {transform:translate(4px,0);color:var(--gc);text-shadow:-4px 0 var(--gr);clip-path:inset(60% 0 25% 0)}
  50% {transform:translate(-2px,0);color:var(--cold);text-shadow:2px 0 rgba(255,0,0,.4);clip-path:inset(25% 0 65% 0)}
  70% {transform:translate(2px,0);color:#8affe8;clip-path:none}
  100%{transform:none;color:var(--cold);text-shadow:none;clip-path:none}
}
.ctr-unit { font-size:12px; letter-spacing:7px; color:#4a8090; text-transform:uppercase; margin-bottom:36px; }

.clock-wrap { margin:0 auto 32px; width:72px; height:72px; }
.clock-face {
  width:72px; height:72px; border-radius:50%; border:1px solid #162830;
  background:#07090b; position:relative;
  box-shadow:0 0 0 3px #0e1e28,0 0 20px rgba(0,90,130,.08),inset 0 0 16px rgba(0,0,0,.6);
}
.hand { position:absolute; bottom:50%; left:50%; transform-origin:bottom center; border-radius:2px; }
.hand-h { width:3px; height:16px; margin-left:-1.5px; background:#6ab0c0; }
.hand-m { width:2px; height:24px; margin-left:-1px;   background:#4a9aaa; }
.hand-s { width:1px; height:30px; margin-left:-.5px;  background:#2a7888; }
.clock-dot { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:4px; height:4px; border-radius:50%; background:#3a7888; }

.stat-row { display:flex; justify-content:center; gap:36px; margin-bottom:40px; }
.stat { text-align:center; }
.stat-lbl { font-size:9px; letter-spacing:3px; color:#4a8090; text-transform:uppercase; margin-bottom:4px; }
.stat-val { font-size:16px; letter-spacing:2px; color:#6aaabb; }
.stat-val.null { color:#2a5060; }

.btn-row { display:flex; gap:16px; justify-content:center; }
.btn {
  background:none; border:1px solid #2a5a6a; color:#5a9aaa;
  font-family:'Courier New',monospace; font-size:11px; letter-spacing:5px;
  padding:13px 28px; cursor:pointer; text-transform:uppercase;
  transition:border-color .3s,color .3s,box-shadow .3s;
}
.btn:hover { border-color:#3a7a90; color:#7acfd8; box-shadow:0 0 18px rgba(50,130,160,.15); }
.btn:active { transform:scale(.98); }
.btn:disabled { opacity:.3; cursor:not-allowed; }
.btn.accent { border-color:#2e6040; color:#5aaa70; }
.btn.accent:hover { border-color:#3a8050; color:#7acc88; box-shadow:0 0 18px rgba(50,150,80,.12); }

#scheduleSection {
  width:100%; opacity:0; transform:translateY(16px); pointer-events:none;
  position:absolute; text-align:left; padding:0 4px; transition:opacity .3s,transform .3s;
}
#scheduleSection.visible { opacity:1; transform:none; pointer-events:all; }
.sched-header { font-size:9px; letter-spacing:5px; color:#4a8090; text-transform:uppercase; margin-bottom:6px; }
.sched-title  { font-size:15px; letter-spacing:4px; color:#6aaa80; margin-bottom:22px; }
.sched-list   { list-style:none; margin-bottom:28px; }
.sched-item {
  display:flex; gap:20px; align-items:baseline; padding:9px 0;
  border-bottom:1px solid #0d1e28; opacity:0; transform:translateX(-10px);
  transition:opacity .35s,transform .35s;
}
.sched-item.show { opacity:1; transform:none; }
.sched-time { font-size:12px; letter-spacing:2px; color:#5a9aaa; min-width:46px; }
.sched-act  { font-size:14px; letter-spacing:1px; color:#90c0cc; line-height:1.4; }
.sched-tag  { font-size:9px;  letter-spacing:2px; color:#4a7888; margin-left:auto; }
.sched-note { font-size:9px; letter-spacing:3px; color:#4a7888; text-transform:uppercase; margin-bottom:22px; }
.sched-btn-row { display:flex; gap:12px; }

#flash { position:fixed; inset:0; background:white; opacity:0; pointer-events:none; z-index:400; mix-blend-mode:screen; }
.g-bar { position:fixed; left:0; right:0; height:2px; background:rgba(80,180,200,.3); opacity:0; pointer-events:none; z-index:200; }
.strip { position:fixed; left:0; right:0; height:24px; overflow:hidden; display:flex; align-items:center; opacity:.12; pointer-events:none; z-index:5; }
.strip-inner { white-space:nowrap; font-size:9px; letter-spacing:3px; color:var(--dim); animation:scrollL 24s linear infinite; }
@keyframes scrollL { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.strip.bot { top:auto; bottom:0; opacity:.08; }
.footer { position:fixed; bottom:16px; left:0; right:0; text-align:center; font-size:9px; letter-spacing:3px; color:#2a5060; text-transform:uppercase; pointer-events:none; z-index:10; }

@media(max-width:760px){
  body{flex-direction:column;overflow:auto;}
  .left-panel,.right-panel{width:100%;height:auto;border:none;padding:32px 24px;}
  .left-panel{border-bottom:1px solid #0e2530;padding-bottom:28px;}
  #watchCanvas{max-width:280px;}
}
</style>
</head>
<body>

<div class="strip"><div class="strip-inner" id="topStrip"></div></div>
<div class="strip bot"><div class="strip-inner" id="botStrip"></div></div>
<div id="flash"></div>
<div class="g-bar" id="gb1"></div>
<div class="g-bar" id="gb2"></div>

<div class="left-panel">
  <canvas id="watchCanvas"></canvas>
  <div id="loadingMsg">Loading model…</div>
  <div class="watch-title">人生重開錶 · 迴圈控制裝置</div>
</div>

<div class="right-panel">
  <div id="counterSection">
    <div class="sys-header">LOOP OS v.∞ &nbsp;·&nbsp; 迴圈控制系統</div>
    <div class="frozen-date">20— —&nbsp;·&nbsp;04&nbsp;·&nbsp;15&nbsp;&nbsp;永久</div>
    <div class="ctr-label">本日已重複次數</div>
    <div id="loopCounter">8,247</div>
    <div class="ctr-unit">次　LOOPS</div>
    <div class="clock-wrap">
      <div class="clock-face">
        <div class="hand hand-h" id="hH"></div>
        <div class="hand hand-m" id="hM"></div>
        <div class="hand hand-s" id="hS"></div>
        <div class="clock-dot"></div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="stat-lbl">消耗人生</div><div class="stat-val" id="statYrs">22.6 年</div></div>
      <div class="stat"><div class="stat-lbl">今日進度</div><div class="stat-val" id="statPct">—%</div></div>
      <div class="stat"><div class="stat-lbl">明天</div><div class="stat-val null">無</div></div>
    </div>
    <div class="btn-row">
      <button class="btn"        id="resetBtn" onclick="triggerReset()">重　開　今　日</button>
      <button class="btn accent" id="schedBtn" onclick="openSchedule()">隨　機　行　程</button>
    </div>
  </div>

  <div id="scheduleSection">
    <div class="sched-header">RANDOM SCHEDULE &nbsp;·&nbsp; 第 <span id="schedGen">1</span> 次生成</div>
    <div class="sched-title">今日行程已分配</div>
    <ul class="sched-list" id="schedList"></ul>
    <div class="sched-note">（明日重置後，此行程將永遠消失）</div>
    <div class="sched-btn-row">
      <button class="btn accent" onclick="closeSchedule()">接　受　今　日　行　程</button>
      <button class="btn"        onclick="regenerateSchedule()">再　抽　一　次</button>
    </div>
  </div>
</div>

<div class="footer">死亡不是終結，只是快轉 &nbsp;·&nbsp; 每日強制重置 00:00 &nbsp;·&nbsp; 無法登出</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ── Strips ──────────────────────────────────────
const T="今天 · 今天 · 今天 · 今天 · 今天 · 今天 · 今天 · 今天 · 今天 · 今天 · 今天 · ";
const B="04.15  04.15  04.15  04.15  04.15  04.15  04.15  04.15  04.15  04.15  ";
document.getElementById('topStrip').textContent=T.repeat(4);
document.getElementById('botStrip').textContent=B.repeat(6);

// ── Counter ──────────────────────────────────────
const BASE_COUNT=8247;
let loopCount=BASE_COUNT, schedGenCount=0, inSchedule=false;
function fmtN(n){ return n.toLocaleString('zh-TW'); }
function updateCounter(){
  document.getElementById('loopCounter').textContent=fmtN(loopCount);
  document.getElementById('statYrs').textContent=(loopCount/365.25).toFixed(1)+' 年';
}
setInterval(()=>{ if(!inSchedule){loopCount++;updateCounter();} },28000);
updateCounter();

// ── Clock ────────────────────────────────────────
function tickClock(){
  const now=new Date(),ms=now.getMilliseconds();
  const s=now.getSeconds()+ms/1000,m=now.getMinutes()+s/60,h=(now.getHours()%12)+m/60;
  document.getElementById('hS').style.transform=`rotate(${s*6}deg)`;
  document.getElementById('hM').style.transform=`rotate(${m*6}deg)`;
  document.getElementById('hH').style.transform=`rotate(${h*30}deg)`;
  const pct=(now.getHours()*3600+now.getMinutes()*60+now.getSeconds())/86400;
  document.getElementById('statPct').textContent=(pct*100).toFixed(1)+'%';
}
setInterval(tickClock,50); tickClock();

// ── Glitch ───────────────────────────────────────
const gb1=document.getElementById('gb1'),gb2=document.getElementById('gb2');
function doGlitch(intense){
  const el=document.getElementById('loopCounter');
  el.classList.remove('glitching'); void el.offsetWidth; el.classList.add('glitching');
  el.addEventListener('animationend',()=>el.classList.remove('glitching'),{once:true});
  [gb1,gb2].forEach(b=>{
    b.style.top=(Math.random()*92)+'vh'; b.style.opacity=intense?'0.55':'0.22';
    b.style.height=intense?'4px':'2px'; setTimeout(()=>b.style.opacity='0',intense?200:100);
  });
}
(function sg(){ setTimeout(()=>{ doGlitch(false); sg(); },1800+Math.random()*5000); })();

// ── Reset ────────────────────────────────────────
function triggerReset(){
  const btn=document.getElementById('resetBtn'); if(btn.disabled)return; btn.disabled=true;
  const fl=document.getElementById('flash'); fl.style.transition='none'; fl.style.opacity='0.1';
  setTimeout(()=>{ fl.style.transition='opacity 1s'; fl.style.opacity='0'; },100);
  let g=0; const gi=setInterval(()=>{ doGlitch(true); if(++g>=6)clearInterval(gi); },90);
  const el=document.getElementById('loopCounter'); let f=0;
  const sc=setInterval(()=>{
    el.textContent=fmtN(loopCount+Math.floor(Math.random()*60000));
    if(++f>=10){ clearInterval(sc); loopCount++; updateCounter(); setTimeout(()=>btn.disabled=false,700); }
  },65);
}

// ── Schedule ─────────────────────────────────────
const ACTS=[
  {a:"搭一班你從來沒搭過的公車，不管它去哪裡",t:"移動"},
  {a:"在最近的公園，坐到你覺得夠了為止",      t:"靜止"},
  {a:"點一份菜單上你從沒點過的食物",           t:"飲食"},
  {a:"走一條沒走過的路，允許自己迷路",         t:"探索"},
  {a:"和一個陌生人說話，超過五分鐘",           t:"連結"},
  {a:"去圖書館，隨手取一本書，翻開第47頁",     t:"閱讀"},
  {a:"在日落前找到三件讓你感覺美的事物",       t:"觀察"},
  {a:"打電話給一個超過一年沒說話的人",         t:"聯繫"},
  {a:"學一個你下次八成用不到的小技能",         t:"學習"},
  {a:"今天只用左手完成所有事",                 t:"挑戰"},
  {a:"在咖啡廳坐兩小時，不滑手機，只是看人",  t:"觀察"},
  {a:"試著把今天的心情畫下來，不管畫得多醜",  t:"創作"},
  {a:"吃飯時什麼都不做，只是慢慢吃",           t:"感受"},
  {a:"想像你是第一次來到這個城市的旅人",       t:"想像"},
  {a:"做一件你已說了一百次「等以後」的事",     t:"行動"},
  {a:"隨機打開地圖，走到你手指指到的地方",     t:"隨機"},
  {a:"今天對每個服務你的人，認真看著他的眼睛", t:"在場"},
  {a:"找出你最舊的一張照片，看著它十分鐘",     t:"記憶"},
  {a:"用你不慣用的手，給自己寫一封信",         t:"書寫"},
  {a:"去逛一家你從未進去過的店，什麼都不買",   t:"探索"},
  {a:"今天至少讓自己大笑一次，不管多荒謬",     t:"情感"},
  {a:"在天黑後，獨自在街上走三十分鐘",         t:"夜行"},
  {a:"今天什麼都不計畫，讓事情自己發生",       t:"放手"},
  {a:"找到今天讓你微笑的最小理由",             t:"覺察"},
];
const TIMES=["07:30","08:15","09:00","10:30","11:45","12:00","13:30","14:00","15:15","16:30","17:00","18:30","19:00","20:15","21:00"];

function openSchedule(){
  inSchedule=true; schedGenCount++; document.getElementById('schedGen').textContent=schedGenCount;
  document.getElementById('counterSection').classList.add('hidden');
  buildSchedule(); document.getElementById('scheduleSection').classList.add('visible');
  setTimeout(()=>document.querySelectorAll('.sched-item').forEach((el,i)=>setTimeout(()=>el.classList.add('show'),i*120)),100);
  doGlitch(true);
}
function closeSchedule(){
  document.getElementById('scheduleSection').classList.remove('visible');
  document.querySelectorAll('.sched-item').forEach(el=>el.classList.remove('show'));
  setTimeout(()=>{ document.getElementById('counterSection').classList.remove('hidden'); inSchedule=false; },280);
}
function regenerateSchedule(){
  schedGenCount++; document.getElementById('schedGen').textContent=schedGenCount;
  document.querySelectorAll('.sched-item').forEach(el=>el.classList.remove('show'));
  setTimeout(()=>{ buildSchedule(); setTimeout(()=>document.querySelectorAll('.sched-item').forEach((el,i)=>setTimeout(()=>el.classList.add('show'),i*100)),50); },200);
  doGlitch(false);
}
function buildSchedule(){
  const list=document.getElementById('schedList'); list.innerHTML='';
  const cnt=4+Math.floor(Math.random()*2);
  const pool=[...ACTS].sort(()=>Math.random()-.5).slice(0,cnt);
  const times=[...TIMES].sort(()=>Math.random()-.5).sort((a,b)=>a.localeCompare(b)).slice(0,cnt);
  pool.forEach((item,i)=>{
    const li=document.createElement('li'); li.className='sched-item';
    li.innerHTML=`<span class="sched-time">${times[i]}</span><span class="sched-act">${item.a}</span><span class="sched-tag">${item.t}</span>`;
    list.appendChild(li);
  });
}

// ── THREE.JS + GLB ───────────────────────────────
(function initWatch(){
  const canvas=document.getElementById('watchCanvas');
  const W=canvas.parentElement.clientWidth*0.72;
  canvas.width=W; canvas.height=W;

  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(W,W);
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.2;

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(38,1,0.1,100);
  camera.position.set(0,0,5.5);

  scene.add(new THREE.AmbientLight(0x1a2a38,3.0));
  const key=new THREE.DirectionalLight(0x8ac8e0,2.4); key.position.set(2,3,4); scene.add(key);
  const fill=new THREE.DirectionalLight(0x0a1828,0.7); fill.position.set(-3,-1,2); scene.add(fill);
  const rim=new THREE.DirectionalLight(0x2040c0,0.6); rim.position.set(0,-3,-2); scene.add(rim);

  // Dynamic screen canvas (time + loop count)
  const _sc=document.createElement('canvas'); _sc.width=256; _sc.height=310;
  const _sx=_sc.getContext('2d');
  const _stex=new THREE.CanvasTexture(_sc);

  function drawScreen(){
    const x=_sx,SW=256,SH=310;
    x.fillStyle='#030710'; x.fillRect(0,0,SW,SH);
    x.strokeStyle='rgba(18,50,65,0.28)'; x.lineWidth=0.5;
    for(let i=0;i<SW;i+=20){x.beginPath();x.moveTo(i,0);x.lineTo(i,SH);x.stroke();}
    for(let i=0;i<SH;i+=20){x.beginPath();x.moveTo(0,i);x.lineTo(SW,i);x.stroke();}
    x.fillStyle='#2a5565'; x.font='11px Courier New'; x.textAlign='center';
    x.fillText('人生重開錶',SW/2,22);
    x.strokeStyle='#0c1e2a'; x.lineWidth=1;
    x.beginPath(); x.moveTo(16,30); x.lineTo(SW-16,30); x.stroke();
    const now=new Date();
    const hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0'),ss=String(now.getSeconds()).padStart(2,'0');
    x.fillStyle='#78b8cc'; x.font='bold 52px Courier New'; x.textAlign='center';
    x.fillText(`${hh}:${mm}`,SW/2,90);
    x.fillStyle='#3a7888'; x.font='bold 22px Courier New'; x.fillText(ss,SW/2,116);
    x.fillStyle='#1e3e50'; x.font='10px Courier New'; x.fillText('20——  ·  04  ·  15   永久',SW/2,136);
    x.strokeStyle='#0c1e2a'; x.lineWidth=1;
    x.beginPath(); x.moveTo(16,146); x.lineTo(SW-16,146); x.stroke();
    x.fillStyle='#1e4255'; x.font='10px Courier New'; x.textAlign='center'; x.fillText('LOOP  COUNT',SW/2,164);
    x.fillStyle='#90cad8'; x.font='bold 36px Courier New'; x.fillText(loopCount.toLocaleString('zh-TW'),SW/2,204);
    x.fillStyle='#2a5565'; x.font='12px Courier New'; x.fillText('次',SW/2,222);
    x.strokeStyle='#0c1e2a'; x.lineWidth=1;
    x.beginPath(); x.moveTo(16,232); x.lineTo(SW-16,232); x.stroke();
    const lx=SW/4,rx=3*SW/4,iy=272,r=22;
    x.strokeStyle='#285060'; x.lineWidth=1.5; x.beginPath(); x.arc(lx,iy,r,0,Math.PI*2); x.stroke();
    x.strokeStyle='#142530'; x.lineWidth=0.8; x.beginPath(); x.arc(lx,iy,r*.5,0,Math.PI*2); x.stroke();
    x.fillStyle='#1a3e50'; x.font='10px Courier New'; x.textAlign='center'; x.fillText('重置',lx,iy+r+14);
    x.strokeStyle='#1a3548'; x.lineWidth=1; x.strokeRect(rx-r,iy-r,r*2,r*2);
    for(let p=0;p<300;p++){
      const px=rx-r+Math.random()*r*2,py=iy-r+Math.random()*r*2,v=Math.random();
      x.fillStyle=v>0.65?`rgba(50,145,165,${v*.5})`:`rgba(6,18,28,${v})`; x.fillRect(px,py,1,1);
    }
    x.fillStyle='#1a3e50'; x.font='10px Courier New'; x.fillText('隨機',rx,iy+r+14);
    _stex.needsUpdate=true;
  }
  drawScreen();
  setInterval(drawScreen,1000);

  // Load GLB
  const loading=document.getElementById('loadingMsg');
  const loader=new THREE.GLTFLoader();
  loader.load('./watch.glb',
    function(gltf){
      const model=gltf.scene;

      // ── Auto-fit，保留 GLB 原有全部材質，只做縮放置中 ───────────────
      const box=new THREE.Box3().setFromObject(model);
      const center=box.getCenter(new THREE.Vector3());
      const size=box.getSize(new THREE.Vector3());
      const scale=3.0/Math.max(size.x,size.y,size.z);
      model.scale.setScalar(scale);
      model.position.set(-center.x*scale,-center.y*scale,-center.z*scale);
      scene.add(model);

      loading.style.opacity='0';
      setTimeout(()=>loading.style.display='none',500);
    },
    xhr=>{ if(xhr.total)loading.textContent=`Loading ${Math.round(xhr.loaded/xhr.total*100)}%…`; },
    err=>{ console.error(err); loading.textContent='Model load failed — check watch.glb is in the same folder'; }
  );

  // Mouse interaction
  let autoRotY=0,autoRotX=0.12,tX=0,tY=0,mX=0,mY=0;
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    mX=((e.clientX-r.left)/r.width-.5)*.8; mY=((e.clientY-r.top)/r.height-.5)*.5;
  });
  canvas.addEventListener('mouseleave',()=>{mX=0;mY=0;});

  (function render(){
    requestAnimationFrame(render);
    autoRotY+=0.004; tX+=(mY-tX)*.05; tY+=(mX-tY)*.05;
    scene.rotation.y=autoRotY+tY; scene.rotation.x=autoRotX+tX;
    renderer.render(scene,camera);
  })();

  window.addEventListener('resize',()=>{
    const nW=canvas.parentElement.clientWidth*0.72;
    canvas.width=nW; canvas.height=nW; renderer.setSize(nW,nW);
  });
})();
</script>
</body>
</html>
